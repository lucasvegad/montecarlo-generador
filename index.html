<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montecarlo Noticias — Generador</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --rojo:#D90429;--rojo-glow:rgba(217,4,41,.2);
  --negro:#0B0B0B;--n2:#141414;--n3:#1e1e1e;--n4:#2a2a2a;
  --blanco:#FFF;--g1:#888;--g2:#555;--g3:#333;
  --fh:'Bebas Neue',sans-serif;--fs:'Oswald',sans-serif;--fb:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--negro);color:var(--blanco);font-family:var(--fb);min-height:100vh;overflow-x:hidden}

/* TOPBAR */
.topbar{background:var(--n2);border-bottom:2px solid var(--rojo);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.brand{display:flex;align-items:center;gap:10px}
.brand svg{width:26px;height:26px;fill:var(--rojo)}
.brand-name{font-family:var(--fh);font-size:20px;letter-spacing:2px}
.brand-name span{color:var(--rojo)}
.topbar-tag{font-family:var(--fs);font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--g1);border:1px solid var(--g3);padding:3px 9px;border-radius:2px}

/* MODE TABS */
.mode-tabs{display:flex;border-bottom:2px solid var(--g3);background:var(--n2);padding:0 24px}
.mode-tab{font-family:var(--fs);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:12px 20px;cursor:pointer;border:none;background:none;color:var(--g1);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.mode-tab:hover{color:var(--blanco)}
.mode-tab.activo{color:var(--rojo);border-bottom-color:var(--rojo)}
.mode-label{font-size:9px;letter-spacing:1px;opacity:.6;display:block;margin-top:1px}

/* LAYOUT */
.app-layout{display:grid;grid-template-columns:440px 1fr;min-height:calc(100vh - 106px)}
.panel-form{background:var(--n2);border-right:1px solid var(--g3);overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:8px}
.panel-preview{display:flex;flex-direction:column;align-items:center;padding:28px 20px;gap:18px;background:var(--negro);background-image:radial-gradient(circle at 20% 20%,rgba(217,4,41,.05) 0%,transparent 50%)}

/* SECCIONES */
.seccion{background:var(--n3);border-radius:6px;overflow:hidden;border:1px solid var(--g3)}
.seccion-header{background:var(--n4);border-bottom:1px solid var(--g3);padding:9px 14px;display:flex;align-items:center;gap:8px}
.seccion-num{width:20px;height:20px;border-radius:50%;background:var(--rojo);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:12px;flex-shrink:0}
.seccion-title{font-family:var(--fs);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.seccion-desc{font-size:10px;color:var(--g1);margin-left:auto;font-style:italic}
.seccion-body{padding:14px;display:flex;flex-direction:column;gap:10px}

/* CAMPOS */
.campo{display:flex;flex-direction:column;gap:3px}
.campo label{font-family:var(--fs);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--rojo)}
.campo .hint{font-size:10.5px;color:var(--g1);line-height:1.4;padding:2px 0;font-style:italic}
.campo input,.campo select,.campo textarea{background:var(--negro);border:1px solid var(--g3);border-radius:4px;color:var(--blanco);padding:8px 10px;font-family:var(--fb);font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.campo input:focus,.campo select:focus,.campo textarea:focus{border-color:var(--rojo);box-shadow:0 0 0 2px var(--rojo-glow)}
.campo textarea{resize:vertical;min-height:48px;line-height:1.4}
.campo select option{background:var(--n3)}
.campo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* VIDEO/IMG UPLOAD */
.video-tabs{display:flex;border:1px solid var(--g3);border-radius:4px;overflow:hidden;margin-bottom:4px}
.vtab{flex:1;padding:7px;background:var(--negro);border:none;color:var(--g1);font-family:var(--fs);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.vtab.activo{background:var(--rojo);color:#fff}
.vpanel{display:none}.vpanel.activo{display:flex;flex-direction:column;gap:8px}
.upload-zone{border:2px dashed var(--g3);border-radius:6px;padding:18px 14px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--negro)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--rojo);background:rgba(217,4,41,.04)}
.upload-zone svg{width:28px;height:28px;fill:var(--rojo);opacity:.6;margin-bottom:6px}
.uz-title{font-family:var(--fs);font-size:13px;font-weight:600;margin-bottom:3px}
.uz-sub{font-size:11px;color:var(--g1);line-height:1.5}
.uz-spec{margin-top:8px;background:rgba(217,4,41,.08);border:1px solid rgba(217,4,41,.25);border-radius:4px;padding:8px 10px;font-size:10.5px;color:rgba(255,255,255,.65);line-height:1.7;text-align:left}
.uz-spec strong{color:var(--rojo);font-weight:600}
.vi-info{display:none;background:rgba(217,4,41,.08);border:1px solid rgba(217,4,41,.3);border-radius:4px;padding:9px 12px;font-size:12px;align-items:center;gap:8px}
.vi-info svg{width:14px;height:14px;fill:var(--rojo);flex-shrink:0}
.vi-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vi-remove{background:none;border:none;color:var(--g1);cursor:pointer;font-size:16px;line-height:1}
.vi-remove:hover{color:var(--rojo)}

/* CAROUSEL */
.carousel-plates{display:flex;flex-direction:column;gap:8px}
.plate-card{background:var(--negro);border:1px solid var(--g3);border-radius:6px;overflow:hidden}
.plate-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--n4);border-bottom:1px solid var(--g3)}
.plate-num{background:var(--rojo);color:#fff;font-family:var(--fh);font-size:12px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.plate-type-badge{font-family:var(--fs);font-size:9px;font-weight:700;letter-spacing:2px;color:var(--g1);text-transform:uppercase}
.plate-title-preview{flex:1;font-size:12px;color:var(--g1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plate-actions{display:flex;gap:4px;margin-left:auto}
.plate-btn{background:none;border:1px solid var(--g3);color:var(--g1);font-size:11px;padding:2px 7px;border-radius:3px;cursor:pointer;font-family:var(--fs)}
.plate-btn:hover{border-color:var(--rojo);color:var(--rojo)}
.plate-btn.del:hover{border-color:#f44;color:#f44}
.plate-body{padding:12px;display:flex;flex-direction:column;gap:8px}
.btn-add-plate{width:100%;padding:10px;background:rgba(217,4,41,.08);border:2px dashed rgba(217,4,41,.3);border-radius:6px;color:var(--rojo);font-family:var(--fs);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-add-plate:hover{background:rgba(217,4,41,.15);border-color:var(--rojo)}

/* EXPORT PANEL */
.export-panel{background:var(--n3);border:1px solid var(--g3);border-radius:8px;padding:16px;width:100%;max-width:520px}
.export-title{font-family:var(--fh);font-size:13px;letter-spacing:3px;color:var(--rojo);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.export-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-export{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:12px 10px;background:var(--negro);border:1px solid var(--g3);border-radius:6px;color:var(--blanco);cursor:pointer;font-family:var(--fs);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s;line-height:1.2;text-align:center}
.btn-export:hover{border-color:var(--rojo);background:rgba(217,4,41,.06);color:var(--rojo)}
.btn-export svg{width:22px;height:22px;fill:currentColor;opacity:.8}
.btn-export .sub{font-size:9px;font-weight:400;opacity:.6;letter-spacing:1px}
.btn-export-full{grid-column:1/-1;background:var(--rojo);border-color:var(--rojo);color:#fff;padding:14px}
.btn-export-full:hover{background:#b50020;border-color:#b50020;color:#fff}
.btn-export-full svg{fill:#fff;opacity:1}

/* PROGRESS */
.export-progress{display:none;margin-top:10px;background:var(--negro);border-radius:4px;overflow:hidden;border:1px solid var(--g3)}
.progress-bar{height:4px;background:var(--rojo);width:0%;transition:width .3s ease}
.progress-text{font-size:10px;color:var(--g1);padding:6px 10px;font-family:var(--fs);letter-spacing:1px}

/* PREVIEW LABEL */
.preview-label{font-family:var(--fs);font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--g2);align-self:flex-start}

/* REEL (9:16) */
.reel{width:270px;height:480px;position:relative;background:var(--negro);overflow:hidden;border-radius:10px;box-shadow:0 0 0 1px var(--g3),0 8px 40px rgba(0,0,0,.7),0 0 60px var(--rojo-glow)}
/* SINGLE (1:1) */
.single-reel{width:320px;height:320px}

/* ESCENAS */
.escena{position:absolute;inset:0;display:none;opacity:0;transition:opacity .3s}
.escena.activa{display:flex;opacity:1}
.ebadge{position:absolute;top:9px;left:9px;z-index:20;display:flex;align-items:center;gap:4px;background:var(--rojo);padding:2px 7px;border-radius:2px}
.ebadge .enum{font-family:var(--fh);font-size:12px;color:#fff;line-height:1}
.ebadge .etxt{font-family:var(--fb);font-size:8px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,.7);text-transform:uppercase}

/* E1 */
.e1{background:linear-gradient(150deg,#1e0008 0%,#0B0B0B 55%,#0f0000 100%);flex-direction:column;justify-content:center;padding:0 24px}
.e1-linea{position:absolute;left:0;top:50%;transform:translateY(-50%);width:4px;height:140px;background:var(--rojo);border-radius:0 2px 2px 0}
.e1-cat{font-family:var(--fh);font-size:10px;letter-spacing:5px;color:var(--rojo);margin-bottom:6px}
.e1-titulo{font-family:var(--fh);font-size:46px;line-height:.88;color:var(--blanco);text-transform:uppercase;margin-bottom:12px;word-break:break-word}
.e1-sub{font-family:var(--fs);font-size:11px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);background:rgba(217,4,41,.12);border-left:3px solid var(--rojo);padding:3px 8px;display:inline-block}

/* E2 */
.e2{background:#000}
.e2-vbg{position:absolute;inset:0}
.e2-vbg video,.e2-vbg iframe{width:100%;height:100%;object-fit:cover;display:block}
.e2-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:#111;border:2px dashed #222}
.e2-ph svg{width:32px;height:32px;fill:var(--rojo);opacity:.4}
.e2-ph p{font-size:9px;color:#333;letter-spacing:2px;text-transform:uppercase}
.e2-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.2) 0%,rgba(0,0,0,.1) 40%,rgba(0,0,0,.8) 100%);pointer-events:none}
.e2-toplabel{position:absolute;top:32px;left:9px;right:9px;font-family:var(--fh);font-size:12px;letter-spacing:3px;color:var(--blanco);text-shadow:1px 1px 6px rgba(0,0,0,.9);z-index:5}
.e2-bottom{position:absolute;bottom:0;left:0;right:0;padding:14px 12px;z-index:5}
.e2-headline{font-family:var(--fh);font-size:22px;line-height:1;text-transform:uppercase;color:var(--blanco);text-shadow:1px 1px 8px rgba(0,0,0,1);margin-bottom:6px}
.e2-banda{background:var(--rojo);display:inline-block;padding:2px 8px;font-family:var(--fs);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}

/* E3 */
.e3{background:var(--n2);flex-direction:column;justify-content:center;padding:42px 14px 14px;gap:8px}
.e3-hdr{font-family:var(--fh);font-size:10px;letter-spacing:4px;color:var(--rojo);margin-bottom:2px}
.e3-bloque{background:rgba(217,4,41,.07);border-left:4px solid var(--rojo);padding:7px 10px;border-radius:0 4px 4px 0}
.e3-bloque .etiq{font-family:var(--fh);font-size:8px;letter-spacing:2.5px;color:var(--rojo);display:block;margin-bottom:1px}
.e3-bloque .val{font-family:var(--fs);font-size:15px;font-weight:600;text-transform:uppercase;color:var(--blanco);line-height:1.1}

/* E4 */
.e4{background:linear-gradient(160deg,#0d0d0d 0%,#180008 100%);flex-direction:column;align-items:center;justify-content:center}
.e4-ico svg{width:40px;height:40px;fill:var(--rojo)}
.e4-ico{margin-bottom:10px}
.e4-nombre{font-family:var(--fh);font-size:38px;letter-spacing:2px;color:var(--blanco);text-align:center;line-height:1}
.e4-nombre span{color:var(--rojo);display:block}
.e4-linea{width:80px;height:2px;background:var(--rojo);margin:10px auto;border-radius:1px}
.e4-tagline{font-family:var(--fb);font-size:9px;font-weight:500;letter-spacing:2.5px;color:rgba(255,255,255,.4);text-transform:uppercase;text-align:center}
.e4-redes{position:absolute;bottom:14px;display:flex;gap:12px}
.e4-redes span{font-family:var(--fs);font-size:9px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.3);text-transform:uppercase}

/* SINGLE */
.single-img-frame{position:absolute;inset:0;background:#111}
.single-img-frame img{width:100%;height:100%;object-fit:cover;display:block}
.single-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border:2px dashed #222}
.single-ph svg{width:36px;height:36px;fill:var(--rojo);opacity:.4}
.single-ph p{font-size:10px;color:#333;letter-spacing:2px;text-transform:uppercase}
.single-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15) 0%,rgba(0,0,0,.75) 100%);pointer-events:none}
.single-cat{position:absolute;top:12px;left:0;background:var(--rojo);font-family:var(--fh);font-size:11px;letter-spacing:3px;color:#fff;padding:4px 12px}
.single-content{position:absolute;bottom:0;left:0;right:0;padding:14px}
.single-titulo{font-family:var(--fh);font-size:32px;line-height:.92;text-transform:uppercase;color:var(--blanco);text-shadow:1px 1px 8px rgba(0,0,0,.9);margin-bottom:8px;word-break:break-word}
.single-sub{font-family:var(--fs);font-size:11px;letter-spacing:1.5px;color:rgba(255,255,255,.6);text-transform:uppercase;border-left:3px solid var(--rojo);padding:2px 8px;margin-bottom:10px;display:block}
.single-logo{font-family:var(--fh);font-size:14px;letter-spacing:2px;color:rgba(255,255,255,.5)}
.single-logo span{color:var(--rojo)}

/* CAROUSEL */
.carousel-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
.carousel-slider{display:flex;gap:10px;overflow-x:auto;max-width:600px;padding:10px 4px;scroll-snap-type:x mandatory}
.carousel-slider::-webkit-scrollbar{height:4px}
.carousel-slider::-webkit-scrollbar-thumb{background:var(--rojo);border-radius:2px}
.cslide{width:240px;height:240px;flex-shrink:0;position:relative;border-radius:8px;overflow:hidden;scroll-snap-align:start;box-shadow:0 0 0 1px var(--g3)}
.carousel-dots{display:flex;gap:5px}
.cdot{width:7px;height:7px;border-radius:50%;background:var(--g3);cursor:pointer;transition:background .2s}
.cdot.activo{background:var(--rojo)}
.cplate{width:100%;height:100%;position:relative;background:#111;overflow:hidden}
.cplate img,.cplate video{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.cplate-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(0,0,0,.8) 100%);pointer-events:none}
.cplate-cat{position:absolute;top:8px;left:0;background:var(--rojo);font-family:var(--fh);font-size:9px;letter-spacing:2px;color:#fff;padding:2px 8px}
.cplate-num{position:absolute;top:8px;right:8px;font-family:var(--fh);font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px}
.cplate-content{position:absolute;bottom:0;left:0;right:0;padding:10px}
.cplate-titulo{font-family:var(--fh);font-size:22px;line-height:.95;text-transform:uppercase;color:var(--blanco);text-shadow:1px 1px 6px rgba(0,0,0,.9);margin-bottom:4px}
.cplate-sub{font-family:var(--fs);font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.55);text-transform:uppercase;border-left:2px solid var(--rojo);padding:1px 6px;display:block;margin-bottom:4px}
.cplate-logo{font-family:var(--fh);font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.3)}
.cplate-logo span{color:var(--rojo)}
.cplate-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:2px dashed #222}
.cplate-ph svg{width:24px;height:24px;fill:var(--rojo);opacity:.4}
.cplate-ph p{font-size:9px;color:#333;letter-spacing:1px;text-transform:uppercase}

/* NAV */
.nav-escenas{display:flex;gap:5px}
.btn-nav{background:var(--n3);border:1px solid var(--g3);color:var(--g1);font-family:var(--fs);font-size:10px;font-weight:600;letter-spacing:1px;padding:6px 12px;cursor:pointer;border-radius:3px;transition:all .2s;text-transform:uppercase}
.btn-nav:hover{border-color:var(--rojo);color:var(--blanco)}
.btn-nav.activo{background:var(--rojo);border-color:var(--rojo);color:#fff}

/* HIDDEN EXPORT CANVAS - renderizado a resolución completa */
#exportStage{position:fixed;left:-9999px;top:0;z-index:-1;pointer-events:none}
.export-reel{width:1080px;height:1920px;position:relative;overflow:hidden;background:var(--negro)}
.export-single{width:1080px;height:1080px;position:relative;overflow:hidden;background:var(--negro)}
.export-carousel-plate{width:1080px;height:1080px;position:relative;overflow:hidden;background:#111}

/* escalado para export: multiplica todos los tamaños × 4 */
.export-reel .e1-titulo{font-size:184px;line-height:.88}
.export-reel .e1-cat{font-size:40px;letter-spacing:20px}
.export-reel .e1-sub{font-size:44px;letter-spacing:8px;padding:12px 32px;border-left-width:12px}
.export-reel .e1-linea{width:16px;height:560px}
.export-reel .ebadge{top:36px;left:36px;padding:8px 28px;border-radius:8px}
.export-reel .ebadge .enum{font-size:48px}
.export-reel .ebadge .etxt{font-size:32px;letter-spacing:8px}
.export-reel .e2-toplabel{top:128px;left:36px;font-size:48px;letter-spacing:12px}
.export-reel .e2-bottom{padding:56px 48px}
.export-reel .e2-headline{font-size:88px;margin-bottom:24px}
.export-reel .e2-banda{font-size:40px;letter-spacing:8px;padding:8px 32px}
.export-reel .e3-hdr{font-size:40px;letter-spacing:16px;margin-bottom:8px}
.export-reel .e3-bloque{padding:28px 40px;border-left-width:16px;margin-bottom:8px}
.export-reel .e3-bloque .etiq{font-size:32px;letter-spacing:10px;margin-bottom:4px}
.export-reel .e3-bloque .val{font-size:60px}
.export-reel .e3{padding:168px 56px 56px;gap:32px}
.export-reel .e4-ico svg{width:160px;height:160px}
.export-reel .e4-ico{margin-bottom:40px}
.export-reel .e4-nombre{font-size:152px;letter-spacing:8px}
.export-reel .e4-linea{width:320px;height:8px;margin:40px auto}
.export-reel .e4-tagline{font-size:36px;letter-spacing:10px}
.export-reel .e4-redes{bottom:56px;gap:48px}
.export-reel .e4-redes span{font-size:36px;letter-spacing:4px}

.export-single .single-cat{font-size:44px;letter-spacing:12px;padding:16px 48px}
.export-single .single-titulo{font-size:128px;line-height:.92;margin-bottom:32px}
.export-single .single-sub{font-size:44px;letter-spacing:6px;border-left-width:12px;padding:8px 32px;margin-bottom:40px}
.export-single .single-logo{font-size:56px;letter-spacing:8px}
.export-single .single-content{padding:56px}

.export-carousel-plate .cplate-cat{font-size:36px;letter-spacing:8px;padding:8px 32px}
.export-carousel-plate .cplate-num{font-size:40px;top:32px;right:32px}
.export-carousel-plate .cplate-titulo{font-size:88px;line-height:.95;margin-bottom:16px}
.export-carousel-plate .cplate-sub{font-size:36px;letter-spacing:6px;border-left-width:8px;padding:4px 24px;margin-bottom:16px}
.export-carousel-plate .cplate-logo{font-size:40px;letter-spacing:4px}
.export-carousel-plate .cplate-content{padding:40px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--n2)}
::-webkit-scrollbar-thumb{background:var(--g3);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--rojo)}

@media(max-width:800px){
  .app-layout{grid-template-columns:1fr}
  .panel-preview{border-top:1px solid var(--g3)}
  .reel{width:240px;height:427px}
  .single-reel{width:280px;height:280px}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <svg viewBox="0 0 24 24"><path d="M18 11V3l-14 5v6l14 5V11zm0 0l3-1v2l-3-1zM4 14l1 6h2l-1-6H4z"/></svg>
    <div class="brand-name">MONTECARLO <span>NOTICIAS</span></div>
  </div>
  <div class="topbar-tag">Generador de Contenido</div>
</header>

<div class="mode-tabs">
  <button class="mode-tab activo" onclick="setMode('single',this)">A — Imagen única<span class="mode-label">Una placa · 1:1</span></button>
  <button class="mode-tab" onclick="setMode('carousel',this)">B — Carrusel<span class="mode-label">Múltiples placas</span></button>
  <button class="mode-tab" onclick="setMode('reel',this)">C — Reel<span class="mode-label">4 escenas · 9:16</span></button>
</div>

<div class="app-layout">
  <aside class="panel-form" id="panelForm"></aside>
  <main class="panel-preview" id="panelPreview"></main>
</div>

<!-- STAGE OCULTO para exportar a resolución completa -->
<div id="exportStage"></div>

<script>
/* ══════ ESTADO ══════ */
let modo = 'single';
let escena = 1;
let plates = [];
let plateId = 0;

/* ══════ HELPERS ══════ */
const g = id => document.getElementById(id);
const v = id => g(id) ? g(id).value : '';

/* ══════ MODO ══════ */
function setMode(m, btn) {
  modo = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('activo'));
  btn.classList.add('activo');
  renderForm(); renderPreview();
}

/* ══════════════════════════════════════
   FORMS
══════════════════════════════════════ */
function renderForm() {
  g('panelForm').innerHTML = modo === 'single' ? formSingle() : modo === 'carousel' ? formCarousel() : formReel();
}

function formSingle() {
  return `
  <div class="seccion"><div class="seccion-header"><div class="seccion-num">1</div><div class="seccion-title">Contenido</div></div>
  <div class="seccion-body">
    <div class="campo"><label>Categoría</label><div class="hint">Sección del portal: POLICIALES, POLÍTICA, SOCIEDAD, etc.</div>
      <select id="fs-cat" onchange="syncSingle()"><option>POLICIALES</option><option>POLÍTICA</option><option>SOCIEDAD</option><option>ECONOMÍA</option><option>DEPORTES</option><option>MUNICIPIO</option></select></div>
    <div class="campo"><label>Titular</label><div class="hint">Frase de impacto, 3–6 palabras en mayúsculas. Ej: "CERRARON EL BARRIO".</div>
      <textarea id="fs-titulo" rows="2" placeholder="TITULAR DE LA NOTA" oninput="syncSingle()"></textarea></div>
    <div class="campo"><label>Subtítulo</label><div class="hint">Aclaración corta: lugar, persona o contexto. Ej: "Montecarlo, Misiones".</div>
      <input id="fs-sub" type="text" placeholder="Lugar o nombre clave" oninput="syncSingle()"></div>
  </div></div>
  <div class="seccion"><div class="seccion-header"><div class="seccion-num">2</div><div class="seccion-title">Foto de fondo</div></div>
  <div class="seccion-body">
    <div class="campo"><div class="hint">Idealmente cuadrada 1:1. Mínimo <strong>1080×1080 px</strong>. JPG, PNG, WebP.</div>
      <div class="upload-zone" id="uzSingle" onclick="g('imgSingleInput').click()" ondragover="dragOver(event,'uzSingle')" ondragleave="dragLeave('uzSingle')" ondrop="dropImg(event,'uzSingle','s-img')">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-1 2-2zm-11-7l2.03 2.71L15 11l4 5H5l5-7z"/></svg>
        <div class="uz-title">Hacé clic o arrastrá la foto</div><div class="uz-sub">JPG · PNG · WebP</div>
        <div class="uz-spec"><strong>📐 Tamaño ideal:</strong> 1080×1080 px (1:1)<br>También sirve 1080×1350 px (vertical)<br>Peso máx recomendado: <strong>5MB</strong></div>
      </div>
      <input type="file" id="imgSingleInput" accept="image/*" onchange="loadSingleImg(event)" style="display:none"></div>
  </div></div>`;
}

function formReel() {
  return `
  <div class="seccion"><div class="seccion-header"><div class="seccion-num">1</div><div class="seccion-title">Hook de impacto</div><div class="seccion-desc">0–2 seg</div></div>
  <div class="seccion-body">
    <div class="campo"><label>Categoría</label><div class="hint">La sección del portal: POLICIALES, POLÍTICA, SOCIEDAD, ECONOMÍA, etc.</div>
      <select id="fr-cat" onchange="syncReel()"><option>POLICIALES</option><option>POLÍTICA</option><option>SOCIEDAD</option><option>ECONOMÍA</option><option>DEPORTES</option><option>MUNICIPIO</option></select></div>
    <div class="campo"><label>Titular principal</label><div class="hint">Frase golpe de 2–5 palabras. Ej: "SE NEGÓ A DECLARAR".</div>
      <textarea id="fr-titulo" rows="2" placeholder="SE NEGÓ A DECLARAR" oninput="syncReel()"></textarea></div>
    <div class="campo"><label>Subtítulo / contexto</label><div class="hint">Aclaración corta de dónde o quién. Ej: "Comodoro Py".</div>
      <input type="text" id="fr-sub" placeholder="Comodoro Py" oninput="syncReel()"></div>
  </div></div>
  <div class="seccion"><div class="seccion-header"><div class="seccion-num">2</div><div class="seccion-title">Video principal</div><div class="seccion-desc">Cuerpo</div></div>
  <div class="seccion-body">
    <div class="campo"><label>Etiqueta superior</label><div class="hint">Texto arriba del video. Indica lugar o contexto. Ej: "EN MONTECARLO".</div>
      <input type="text" id="fr-vlabel" placeholder="EN MONTECARLO" oninput="syncReel()"></div>
    <div class="campo"><label>Headline del video</label><div class="hint">Frase que refuerza la acción. Ej: "INVESTIGAN EL CASO".</div>
      <input type="text" id="fr-vhead" placeholder="INVESTIGAN EL CASO" oninput="syncReel()"></div>
    <div class="campo"><label>Banda roja</label><div class="hint">Etiqueta de la banda roja. Ej: "SEGUIMIENTO EXCLUSIVO".</div>
      <input type="text" id="fr-vbanda" placeholder="SEGUIMIENTO EXCLUSIVO" oninput="syncReel()"></div>
    <div class="campo"><label>Fuente del video</label><div class="hint">Archivo local o link de YouTube/Vimeo.</div>
      <div class="video-tabs">
        <button class="vtab activo" onclick="switchVTab('local',this)">📁 Archivo local</button>
        <button class="vtab" onclick="switchVTab('embed',this)">🔗 YouTube/Vimeo</button>
      </div>
      <div class="vpanel activo" id="vp-local">
        <div class="upload-zone" id="uzVideo" onclick="g('videoFileInput').click()" ondragover="dragOver(event,'uzVideo')" ondragleave="dragLeave('uzVideo')" ondrop="dropVideo(event)">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <div class="uz-title">Hacé clic o arrastrá el video</div><div class="uz-sub">MP4 · MOV · AVI</div>
          <div class="uz-spec"><strong>📐 Tamaño ideal para Reels:</strong><br>• Resolución: <strong>1080×1920 px</strong> (9:16 vertical)<br>• Si es horizontal: mínimo <strong>1920×1080 px</strong><br>• Duración sugerida: <strong>7–30 seg</strong><br>• Formato: <strong>MP4 H.264</strong><br>• Peso: idealmente <strong>bajo 100MB</strong></div>
        </div>
        <input type="file" id="videoFileInput" accept="video/*" onchange="loadVideoFile(event)" style="display:none">
        <div class="vi-info" id="viInfo">
          <svg viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
          <span class="vi-name" id="viName">video.mp4</span>
          <button class="vi-remove" onclick="removeVideo()">✕</button>
        </div>
      </div>
      <div class="vpanel" id="vp-embed">
        <div class="campo"><div class="hint">Pegá la URL completa de YouTube o Vimeo.</div>
          <input type="text" id="fr-vurl" placeholder="https://www.youtube.com/watch?v=..." oninput="loadEmbed()"></div>
        <div class="uz-spec" style="border-radius:4px;padding:8px 10px;background:rgba(217,4,41,.08);border:1px solid rgba(217,4,41,.25);font-size:10.5px;color:rgba(255,255,255,.6);line-height:1.6"><strong>⚠️ Nota:</strong> YouTube puede bloquear el embed. Para exportar en alta calidad, usá siempre el archivo local.</div>
      </div>
    </div>
  </div></div>
  <div class="seccion"><div class="seccion-header"><div class="seccion-num">3</div><div class="seccion-title">Datos del caso</div><div class="seccion-desc">Contexto</div></div>
  <div class="seccion-body">
    <div class="campo-grid">
      <div class="campo"><label>Etiqueta 1</label><div class="hint">Ej: QUIÉN</div><input type="text" id="fr-e1l" placeholder="QUIÉN" oninput="syncReel()"></div>
      <div class="campo"><label>Valor 1</label><div class="hint">El dato concreto</div><input type="text" id="fr-e1v" placeholder="Empresario local" oninput="syncReel()"></div>
    </div>
    <div class="campo-grid">
      <div class="campo"><label>Etiqueta 2</label><div class="hint">Ej: QUÉ</div><input type="text" id="fr-e2l" placeholder="QUÉ" oninput="syncReel()"></div>
      <div class="campo"><label>Valor 2</label><div class="hint">El dato concreto</div><input type="text" id="fr-e2v" placeholder="Se negó a declarar" oninput="syncReel()"></div>
    </div>
    <div class="campo-grid">
      <div class="campo"><label>Etiqueta 3</label><div class="hint">Ej: DÓNDE</div><input type="text" id="fr-e3l" placeholder="DÓNDE" oninput="syncReel()"></div>
      <div class="campo"><label>Valor 3</label><div class="hint">El dato concreto</div><input type="text" id="fr-e3v" placeholder="Juzgado Federal" oninput="syncReel()"></div>
    </div>
  </div></div>
  <div class="seccion"><div class="seccion-header"><div class="seccion-num">4</div><div class="seccion-title">Cierre de marca</div></div>
  <div class="seccion-body">
    <div class="campo"><label>Tagline</label><div class="hint">Frase institucional bajo el logo. Ej: "Actualidad local, sin filtro".</div>
      <input type="text" id="fr-tagline" placeholder="Actualidad local, sin filtro" oninput="syncReel()"></div>
  </div></div>`;
}

function formCarousel() {
  let html = `<div class="seccion"><div class="seccion-header"><div class="seccion-num">★</div><div class="seccion-title">Carrusel de placas</div><div class="seccion-desc">Sin límite</div></div>
  <div class="seccion-body">
    <div class="hint" style="padding:4px 0">Agregá tantas placas como necesités. Foto o video. Se muestran en orden.</div>
    <div class="carousel-plates" id="carouselPlates">`;
  plates.forEach((p, i) => { html += renderPlateForm(p, i); });
  html += `</div><button class="btn-add-plate" onclick="addPlate()">+ Agregar placa</button></div></div>`;
  return html;
}

function renderPlateForm(p, i) {
  const tl = p.type === 'video' ? '🎬 VIDEO' : '🖼️ FOTO';
  return `<div class="plate-card" id="pc-${p.id}">
    <div class="plate-header">
      <div class="plate-num">${i+1}</div>
      <span class="plate-type-badge">${tl}</span>
      <span class="plate-title-preview" id="ptitle-${p.id}">${p.titulo||'Sin título'}</span>
      <div class="plate-actions">
        <button class="plate-btn" onclick="toggleType(${p.id})">${p.type==='foto'?'→ Video':'→ Foto'}</button>
        ${i>0?`<button class="plate-btn" onclick="movePlate(${p.id},-1)">↑</button>`:''}
        ${i<plates.length-1?`<button class="plate-btn" onclick="movePlate(${p.id},1)">↓</button>`:''}
        <button class="plate-btn del" onclick="deletePlate(${p.id})">✕</button>
      </div>
    </div>
    <div class="plate-body">
      <div class="campo"><label>Titular</label><div class="hint">Texto principal de esta placa. Corto e impactante.</div>
        <input type="text" placeholder="Titular de la placa" value="${p.titulo||''}" oninput="updatePlate(${p.id},'titulo',this.value)"></div>
      <div class="campo"><label>Subtítulo</label><div class="hint">Detalle corto: lugar, nombre, dato clave.</div>
        <input type="text" placeholder="Subtítulo" value="${p.sub||''}" oninput="updatePlate(${p.id},'sub',this.value)"></div>
      ${p.type==='foto' ? plateFotoField(p) : plateVideoField(p)}
    </div>
  </div>`;
}

function plateFotoField(p) {
  return `<div class="campo"><label>Foto</label><div class="hint">Cuadrada 1:1. Mínimo <strong>1080×1080 px</strong>. JPG, PNG, WebP.</div>
    <div class="upload-zone" id="uz-p${p.id}" onclick="g('pimg-${p.id}').click()" ondragover="dragOver(event,'uz-p${p.id}')" ondragleave="dragLeave('uz-p${p.id}')" ondrop="dropPlateImg(event,${p.id})">
      <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-1 2-2zm-11-7l2.03 2.71L15 11l4 5H5l5-7z"/></svg>
      <div class="uz-title">${p.imgUrl?'✓ Foto cargada — clic para cambiar':'Clic o arrastrar foto'}</div>
    </div>
    <input type="file" id="pimg-${p.id}" accept="image/*" onchange="loadPlateImg(event,${p.id})" style="display:none"></div>`;
}

function plateVideoField(p) {
  return `<div class="campo"><label>Video</label><div class="hint">Vertical 1080×1920 px. MP4 H.264. Bajo 100MB.</div>
    <div class="video-tabs">
      <button class="vtab ${p.videoMode!=='embed'?'activo':''}" onclick="setPlateVideoMode(${p.id},'local',this)">📁 Local</button>
      <button class="vtab ${p.videoMode==='embed'?'activo':''}" onclick="setPlateVideoMode(${p.id},'embed',this)">🔗 Link</button>
    </div>
    ${p.videoMode==='embed'
      ? `<input type="text" placeholder="https://youtube.com/watch?v=..." value="${p.embedUrl||''}" oninput="updatePlate(${p.id},'embedUrl',this.value);loadPlateEmbed(${p.id},this.value)">`
      : `<div class="upload-zone" id="uz-pv${p.id}" onclick="g('pvid-${p.id}').click()">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <div class="uz-title">${p.videoUrl?'✓ Video cargado — clic para cambiar':'Clic para cargar video'}</div>
         </div>
         <input type="file" id="pvid-${p.id}" accept="video/*" onchange="loadPlateVideo(event,${p.id})" style="display:none">`
    }</div>`;
}

/* ══════════════════════════════════════
   PREVIEWS
══════════════════════════════════════ */
function renderPreview() {
  g('panelPreview').innerHTML = modo==='single' ? previewSingle() : modo==='carousel' ? previewCarousel() : previewReel();
}

function previewSingle() {
  return `<div class="preview-label">PREVIEW — 1080×1080 px</div>
  <div class="reel single-reel" id="singleFrame" style="position:relative;">
    <div class="single-img-frame" id="singleImgFrame">
      <div class="single-ph" id="single-ph"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-1 2-2zm-11-7l2.03 2.71L15 11l4 5H5l5-7z"/></svg><p>Cargá la foto</p></div>
      <img id="s-img" src="" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0">
    </div>
    <div class="single-overlay"></div>
    <div class="single-cat" id="s-cat">CATEGORÍA</div>
    <div class="single-content">
      <div class="single-titulo" id="s-titulo">TITULAR DE LA NOTA</div>
      <span class="single-sub" id="s-sub">Subtítulo</span>
      <div class="single-logo">MONTECARLO <span>NOTICIAS</span></div>
    </div>
  </div>
  ${exportPanel('single')}`;
}

function previewReel() {
  return `<div class="preview-label">PREVIEW — 1080×1920 px</div>
  <div class="reel" id="reelFrame">
    <div class="escena activa e1" id="re1">
      <div class="ebadge"><span class="enum">1</span><span class="etxt">ESCENA</span></div>
      <div class="e1-linea"></div>
      <div style="padding-left:12px"><p class="e1-cat" id="r-cat">POLICIALES</p><h1 class="e1-titulo" id="r-titulo">SE NEGÓ<br>A DECLARAR</h1><span class="e1-sub" id="r-sub">Comodoro Py</span></div>
    </div>
    <div class="escena e2" id="re2">
      <div class="ebadge"><span class="enum">2</span><span class="etxt">ESCENA</span></div>
      <div class="e2-vbg" id="r-videoBg"><div class="e2-ph"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><p>Cargá el video</p></div></div>
      <div class="e2-overlay"></div>
      <div class="e2-toplabel" id="r-vlabel">EN MONTECARLO</div>
      <div class="e2-bottom"><div class="e2-headline" id="r-vhead">INVESTIGAN EL CASO</div><div class="e2-banda" id="r-vbanda">SEGUIMIENTO EXCLUSIVO</div></div>
    </div>
    <div class="escena e3" id="re3">
      <div class="ebadge"><span class="enum">3</span><span class="etxt">ESCENA</span></div>
      <p class="e3-hdr">LO QUE SABEMOS</p>
      <div class="e3-bloque"><span class="etiq" id="r-e1l">QUIÉN</span><span class="val" id="r-e1v">—</span></div>
      <div class="e3-bloque"><span class="etiq" id="r-e2l">QUÉ</span><span class="val" id="r-e2v">—</span></div>
      <div class="e3-bloque"><span class="etiq" id="r-e3l">DÓNDE</span><span class="val" id="r-e3v">—</span></div>
    </div>
    <div class="escena e4" id="re4">
      <div class="ebadge"><span class="enum">4</span><span class="etxt">ESCENA</span></div>
      <div class="e4-ico"><svg viewBox="0 0 24 24"><path d="M18 11V3l-14 5v6l14 5V11zm0 0l3-1v2l-3-1zM4 14l1 6h2l-1-6H4z"/></svg></div>
      <div class="e4-nombre">MONTECARLO<span>NOTICIAS</span></div>
      <div class="e4-linea"></div>
      <p class="e4-tagline" id="r-tagline">Actualidad local, sin filtro</p>
      <div class="e4-redes"><span>FB</span><span>IG</span><span>X</span></div>
    </div>
  </div>
  <div class="nav-escenas">
    <button class="btn-nav activo" onclick="goTo(1,this)">1 HOOK</button>
    <button class="btn-nav" onclick="goTo(2,this)">2 VIDEO</button>
    <button class="btn-nav" onclick="goTo(3,this)">3 DATOS</button>
    <button class="btn-nav" onclick="goTo(4,this)">4 CIERRE</button>
  </div>
  ${exportPanel('reel')}`;
}

function previewCarousel() {
  let slides = plates.length === 0
    ? `<div style="color:var(--g2);font-size:12px;font-family:var(--fs);letter-spacing:2px;text-transform:uppercase;padding:20px;text-align:center;width:240px;height:240px;display:flex;align-items:center;justify-content:center;border:2px dashed var(--g3);border-radius:8px">Agregá placas desde el panel</div>`
    : plates.map((p,i) => `<div class="cslide" id="cslide-${p.id}">${renderPlatePreview(p,i)}</div>`).join('');
  let dots = plates.map((_,i) => `<div class="cdot ${i===0?'activo':''}" onclick="scrollToSlide(${i})"></div>`).join('');
  return `<div class="preview-label">PREVIEW CARRUSEL (${plates.length} placa${plates.length!==1?'s':''})</div>
  <div class="carousel-wrap">
    <div class="carousel-slider" id="carouselSlider">${slides}</div>
    <div class="carousel-dots">${dots}</div>
  </div>
  ${exportPanel('carousel')}`;
}

function renderPlatePreview(p, i) {
  let media = '';
  if (p.type==='foto' && p.imgUrl) media = `<img src="${p.imgUrl}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">`;
  else if (p.type==='video' && p.videoUrl) media = `<video src="${p.videoUrl}" autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0"></video>`;
  else if (p.type==='video' && p.embedUrl) { const em=parseEmbed(p.embedUrl); media = em ? `<iframe src="${em}" frameborder="0" allow="autoplay;encrypted-media" style="width:100%;height:100%;position:absolute;inset:0"></iframe>` : ''; }
  else media = `<div class="cplate-ph"><svg viewBox="0 0 24 24"><path d="${p.type==='video'?'M8 5v14l11-7z':'M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-1 2-2zm-11-7l2.03 2.71L15 11l4 5H5l5-7z'}"/></svg><p>${p.type==='video'?'Video':'Foto'} ${i+1}</p></div>`;
  return `<div class="cplate">${media}<div class="cplate-overlay"></div><div class="cplate-cat">MCN</div><span class="cplate-num">${i+1}/${plates.length}</span><div class="cplate-content"><div class="cplate-titulo">${p.titulo||'TITULAR'}</div>${p.sub?`<span class="cplate-sub">${p.sub}</span>`:''}<div class="cplate-logo">MCN <span>NOTICIAS</span></div></div></div>`;
}

/* ══════════════════════════════════════
   EXPORT PANEL HTML
══════════════════════════════════════ */
function exportPanel(type) {
  if (type === 'reel') {

   CAROUSEL LOGIC
══════════════════════════════════════ */
function addPlate() {
  plateId++;
  plates.push({id:plateId,type:'foto',titulo:'',sub:'',imgUrl:null,videoUrl:null,embedUrl:'',videoMode:'local'});
  renderForm(); renderPreview();
}
function deletePlate(id) { plates=plates.filter(p=>p.id!==id); renderForm(); renderPreview(); }
function movePlate(id,dir) {
  const i=plates.findIndex(p=>p.id===id), ni=i+dir;
  if(ni<0||ni>=plates.length) return;
  [plates[i],plates[ni]]=[plates[ni],plates[i]];
  renderForm(); renderPreview();
}
function toggleType(id) {
  const p=plates.find(p=>p.id===id); if(!p) return;
  p.type=p.type==='foto'?'video':'foto'; renderForm(); renderPreview();
}
function updatePlate(id,key,val) {
  const p=plates.find(p=>p.id===id); if(!p) return;
  p[key]=val;
  const tp=g(`ptitle-${id}`); if(tp&&key==='titulo') tp.textContent=val||'Sin título';
  const slide=g(`cslide-${id}`);
  const idx=plates.findIndex(pl=>pl.id===id);
  if(slide) slide.innerHTML=renderPlatePreview(p,idx);
}
function setPlateVideoMode(id,mode,btn) {
  const p=plates.find(p=>p.id===id); if(!p) return;
  p.videoMode=mode;
  btn.parentElement.querySelectorAll('.vtab').forEach(t=>t.classList.remove('activo'));
  btn.classList.add('activo');
  renderForm();
}
function loadPlateImg(e,id) {
  const file=e.target.files[0]; if(!file) return;
  const p=plates.find(p=>p.id===id); if(p) p.imgUrl=URL.createObjectURL(file);
  renderForm(); renderPreview();
}
function dropPlateImg(e,id) {
  e.preventDefault();
  const file=e.dataTransfer.files[0];
  if(!file||!file.type.startsWith('image/')) return;
  const p=plates.find(p=>p.id===id); if(p) p.imgUrl=URL.createObjectURL(file);
  renderForm(); renderPreview();
}
function loadPlateVideo(e,id) {
  const file=e.target.files[0]; if(!file) return;
  const p=plates.find(p=>p.id===id); if(p) p.videoUrl=URL.createObjectURL(file);
  renderPreview();
}
function loadPlateEmbed(id,url) {
  const p=plates.find(p=>p.id===id); if(!p) return;
  p.embedUrl=url;
  const slide=g(`cslide-${id}`);
  const idx=plates.findIndex(pl=>pl.id===id);
  if(slide) slide.innerHTML=renderPlatePreview(p,idx);
}
function scrollToSlide(idx) {
  const slider=g('carouselSlider'); if(!slider) return;
  const slides=slider.querySelectorAll('.cslide');
  if(slides[idx]) slides[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  document.querySelectorAll('.cdot').forEach((d,i)=>d.classList.toggle('activo',i===idx));
}

function switchVTab(tab,btn) {
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('activo'));

  btn.classList.add('activo'); g('vp-'+tab)?.classList.add('activo');
  if(tab==='embed') loadEmbed();
}
function loadVideoFile(e) {
  const file=e.target.files[0]; if(!file) return;
  const url=URL.createObjectURL(file);
  g('r-videoBg').innerHTML=`<video src="${url}" autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover"></video>`;
  g('viInfo').style.display='flex'; g('viName').textContent=file.name;
}
function removeVideo() {
  g('r-videoBg').innerHTML=`<div class="e2-ph"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><p>Cargá el video</p></div>`;
  g('viInfo').style.display='none'; g('videoFileInput').value='';
}
function loadSingleImg(e) {
  const file=e.target.files[0]; if(!file) return;
  const url=URL.createObjectURL(file);
  const img=g('s-img'); if(img){img.src=url;img.style.display='block';}
  const ph=g('single-ph'); if(ph) ph.style.display='none';
}
function loadEmbed() {
  const url=v('fr-vurl')?.trim(); if(!url) return;
  const em=parseEmbed(url);
  if(em&&g('r-videoBg')) g('r-videoBg').innerHTML=`<iframe src="${em}" frameborder="0" allow="autoplay;encrypted-media" style="width:100%;height:100%"></iframe>`;
}
function parseEmbed(url) {
  const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(yt) return `https://www.youtube.com/embed/${yt[1]}?autoplay=1&mute=1&loop=1&playlist=${yt[1]}&controls=0`;
  const vi=url.match(/vimeo\.com\/(\d+)/);
  if(vi) return `https://player.vimeo.com/video/${vi[1]}?autoplay=1&muted=1&loop=1&controls=0`;
  return null;
}
function dragOver(e,id){e.preventDefault();g(id)?.classList.add('drag')}
function dragLeave(id){g(id)?.classList.remove('drag')}
function dropVideo(e){
  e.preventDefault();g('uzVideo')?.classList.remove('drag');
  const file=e.dataTransfer.files[0];
  if(file&&file.type.startsWith('video/')){
    const url=URL.createObjectURL(file);
    g('r-videoBg').innerHTML=`<video src="${url}" autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover"></video>`;
    g('viInfo').style.display='flex'; g('viName').textContent=file.name;
  }
}
function dropImg(e,uzId,imgId){
  e.preventDefault();g(uzId)?.classList.remove('drag');
  const file=e.dataTransfer.files[0];
  if(file&&file.type.startsWith('image/')){
    const url=URL.createObjectURL(file);
    const img=g(imgId); if(img){img.src=url;img.style.display='block';}
    const ph=g('single-ph'); if(ph) ph.style.display='none';
  }
}

/* Construye el DOM de exportación a resolución completa */
function buildExportNode(type, data) {
  const stage = g('exportStage');
  stage.innerHTML = '';
  const node = document.createElement('div');

  if (type === 'reel-e1') {
    node.className = 'export-reel';
    node.innerHTML = `
      <div class="escena activa e1" style="display:flex">
        <div class="ebadge"><span class="enum">1</span><span class="etxt">ESCENA</span></div>
        <div class="e1-linea"></div>
        <div style="padding-left:48px">
          <p class="e1-cat">${data.cat}</p>
          <h1 class="e1-titulo">${data.titulo}</h1>
          <span class="e1-sub">${data.sub}</span>
        </div>
      </div>`;
  }
  else if (type === 'reel-e2') {
    node.className = 'export-reel';
    const videoHtml = data.videoUrl
      ? `<video src="${data.videoUrl}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0" autoplay muted></video>`
      : `<div style="width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center;position:absolute;inset:0"><span style="font-family:var(--fh);font-size:80px;letter-spacing:20px;color:#222">VIDEO</span></div>`;
    node.innerHTML = `
      <div class="escena activa e2" style="display:flex;position:absolute;inset:0">
        <div class="ebadge"><span class="enum">2</span><span class="etxt">ESCENA</span></div>
        <div class="e2-vbg">${videoHtml}</div>
        <div class="e2-overlay"></div>
        <div class="e2-toplabel">${data.vlabel}</div>
        <div class="e2-bottom">
          <div class="e2-headline">${data.vhead}</div>
          <div class="e2-banda">${data.vbanda}</div>
        </div>
      </div>`;
  }
  else if (type === 'reel-e3') {
    node.className = 'export-reel';
    node.innerHTML = `
      <div class="escena activa e3" style="display:flex;position:absolute;inset:0">
        <div class="ebadge"><span class="enum">3</span><span class="etxt">ESCENA</span></div>
        <p class="e3-hdr">LO QUE SABEMOS</p>
        <div class="e3-bloque"><span class="etiq">${data.e1l}</span><span class="val">${data.e1v}</span></div>
        <div class="e3-bloque"><span class="etiq">${data.e2l}</span><span class="val">${data.e2v}</span></div>
        <div class="e3-bloque"><span class="etiq">${data.e3l}</span><span class="val">${data.e3v}</span></div>
      </div>`;
  }
  else if (type === 'reel-e4') {
    node.className = 'export-reel';
    node.innerHTML = `
      <div class="escena activa e4" style="display:flex;position:absolute;inset:0">
        <div class="ebadge"><span class="enum">4</span><span class="etxt">ESCENA</span></div>
        <div class="e4-ico"><svg viewBox="0 0 24 24"><path d="M18 11V3l-14 5v6l14 5V11zm0 0l3-1v2l-3-1zM4 14l1 6h2l-1-6H4z"/></svg></div>
        <div class="e4-nombre">MONTECARLO<span>NOTICIAS</span></div>
        <div class="e4-linea"></div>
        <p class="e4-tagline">${data.tagline}</p>
        <div class="e4-redes"><span>FB</span><span>IG</span><span>X</span></div>
      </div>`;
  }
  else if (type === 'single') {
    node.className = 'export-single';
    const imgHtml = data.imgUrl
      ? `<img src="${data.imgUrl}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">`
      : `<div style="width:100%;height:100%;background:#111;position:absolute;inset:0"></div>`;
    node.innerHTML = `
      ${imgHtml}
      <div class="single-overlay"></div>
      <div class="single-cat">${data.cat}</div>
      <div class="single-content">
        <div class="single-titulo">${data.titulo}</div>
        <span class="single-sub">${data.sub}</span>
        <div class="single-logo">MONTECARLO <span>NOTICIAS</span></div>
      </div>`;
  }
  else if (type === 'carousel-plate') {
    node.className = 'export-carousel-plate';
    const p = data.plate;
    let media = '';
    if (p.imgUrl) media = `<img src="${p.imgUrl}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">`;
    else if (p.videoUrl) media = `<video src="${p.videoUrl}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0" autoplay muted></video>`;

      <div class="cplate-cat">MCN</div>

        <div class="cplate-logo">MCN <span>NOTICIAS</span></div>
      </div>`;
  }

  stage.appendChild(node);
  return node;
}

async function captureNode(node) {
  await new Promise(r=>setTimeout(r,300)); // espera render
  return await html2canvas(node, {
    scale:1,
    useCORS:true,
    allowTaint:true,
    backgroundColor:null,
    logging:false
  });
}

function canvasToBlob(canvas) {
  return new Promise(res => canvas.toBlob(res, 'image/png', 1.0));
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

/* ── EXPORT SINGLE ESCENA ── */
async function exportScene(n) {
  showProgress(10, `Preparando escena ${n}...`);
  const data = getReelData();
  const types = ['reel-e1','reel-e2','reel-e3','reel-e4'];
  const labels = ['1-HOOK','2-VIDEO','3-DATOS','4-CIERRE'];
  const node = buildExportNode(types[n-1], data);
  showProgress(40, 'Renderizando...');
  const canvas = await captureNode(node);
  showProgress(80, 'Generando archivo...');
  const blob = await canvasToBlob(canvas);
  downloadBlob(blob, `MCN_Reel_Escena_${labels[n-1]}.png`);
  showProgress(100, '✓ Descargado');
  setTimeout(hideProgress, 2000);
}

/* ── EXPORT ALL REEL → ZIP ── */
async function exportAllReel() {
  showProgress(5, 'Iniciando exportación...');
  const data = getReelData();
  const zip = new JSZip();
  const types = ['reel-e1','reel-e2','reel-e3','reel-e4'];
  const labels = ['1-HOOK','2-VIDEO','3-DATOS','4-CIERRE'];

  for (let i=0; i<4; i++) {
    showProgress(10 + i*20, `Renderizando escena ${i+1} de 4...`);
    const node = buildExportNode(types[i], data);
    const canvas = await captureNode(node);
    const blob = await canvasToBlob(canvas);
    zip.file(`MCN_Escena_${labels[i]}.png`, blob);
  }

  showProgress(90, 'Generando ZIP...');
  const readme = `MONTECARLO NOTICIAS — REEL
Generado: ${new Date().toLocaleDateString('es-AR')}

ARCHIVOS:
- MCN_Escena_1-HOOK.png       → Escena de apertura (0-2 seg en CapCut)
- MCN_Escena_2-VIDEO.png      → Frame del video (usar como referencia de overlay)
- MCN_Escena_3-DATOS.png      → Tarjeta de datos (mostrar 3-4 seg)
- MCN_Escena_4-CIERRE.png     → Cierre de marca (1-2 seg)

RESOLUCIÓN: 1080×1920 px (9:16) — Óptimo para Instagram Reels, TikTok, YouTube Shorts
FORMATO: PNG sin compresión

INSTRUCCIONES PARA CAPCUT:
1. Crear nuevo proyecto → Ratio 9:16
2. Importar video principal
3. Superponer cada PNG como capa
4. Aplicar tiempos según las notas de arriba
5. Exportar en 1080p / 60fps`;

  zip.file('README.txt', readme);
  const zipBlob = await zip.generateAsync({type:'blob'});
  downloadBlob(zipBlob, `MCN_Reel_${new Date().toISOString().slice(0,10)}.zip`);
  showProgress(100, '✓ ZIP descargado — listo para CapCut');
  setTimeout(hideProgress, 2500);
}

/* ── EXPORT CAROUSEL → ZIP ── */
async function exportCarousel() {
  if (plates.length === 0) { alert('Agregá al menos una placa antes de exportar.'); return; }
  showProgress(5, 'Iniciando exportación del carrusel...');
  const zip = new JSZip();

  for (let i=0; i<plates.length; i++) {
    const pct = 5 + Math.round((i/plates.length)*80);
    showProgress(pct, `Renderizando placa ${i+1} de ${plates.length}...`);
    const node = buildExportNode('carousel-plate', {plate:plates[i], idx:i, total:plates.length});
    const canvas = await captureNode(node);
    const blob = await canvasToBlob(canvas);
    const label = plates[i].titulo ? plates[i].titulo.replace(/[^a-zA-Z0-9]/g,'_').slice(0,20) : `Placa${i+1}`;
    zip.file(`MCN_Carrusel_${String(i+1).padStart(2,'0')}_${label}.png`, blob);
  }

  showProgress(90, 'Generando ZIP...');
  const readme = `MONTECARLO NOTICIAS — CARRUSEL
Generado: ${new Date().toLocaleDateString('es-AR')}
Placas: ${plates.length}

RESOLUCIÓN: 1080×1080 px (1:1) — Óptimo para Instagram Carrusel, Facebook
FORMATO: PNG sin compresión

Los archivos están numerados en orden de publicación.
Subir en Instagram: Nueva publicación → seleccionar todas → publicar como carrusel.`;

  zip.file('README.txt', readme);
  const zipBlob = await zip.generateAsync({type:'blob'});
  downloadBlob(zipBlob, `MCN_Carrusel_${new Date().toISOString().slice(0,10)}.zip`);
  showProgress(100, `✓ ZIP con ${plates.length} placas descargado`);
  setTimeout(hideProgress, 2500);
}

    e1l: (v('fr-e1l')||'QUIÉN').toUpperCase(), e1v: v('fr-e1v')||'—',

    e3l: (v('fr-e3l')||'DÓNDE').toUpperCase(), e3v: v('fr-e3v')||'—',
